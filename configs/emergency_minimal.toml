# EMERGENCY MINIMAL CONFIGURATION
# Ultra-small model to fix critical overfitting (more parameters than samples)
# Use this when you have very limited training data

[training]
# Strong regularization
optimizer = { AdamW = { weight_decay = 0.1, beta1 = 0.9, beta2 = 0.999, eps = 1e-8 } }

# Very conservative learning rate
learning_rate = 0.0001

# Early stopping
early_stopping = { patience = 10, min_delta = 0.001 }

# Limited epochs
epochs = { Auto = { max_epochs = 50 } }

# Warmup
warmup_epochs = 3

# Gradient clipping
clip_gradient = 0.5

# Aggressive learning rate reduction
learning_schedule = { ReduceOnPlateau = { patience = 5, factor = 0.2, min_lr = 1e-8 } }

# Seed
seed = 42

[model]
# MINIMAL ARCHITECTURE: Single layer, tiny capacity
architecture = { MultiLSTM = { layers = 1 } }

# ULTRA-SMALL HIDDEN UNITS: Absolute minimum
hidden_units = { Fixed = [8] }  # Only 8 hidden units!

# Short sequences
sequence_length = { Fixed = 20 }

# MAXIMUM DROPOUT: Extreme regularization
dropout = {
    enabled = true,
    rate = { Fixed = 0.5 },  # 50% dropout!
    apply_to_output = false
}

# No attention (reduces parameters)
attention = { enabled = false }

# Single target only
targets = {
    price_levels = { enabled = true },
    direction = { enabled = false },
    volatility = { enabled = false }
}

[data]
# Large validation split
validation_split = 0.3

# Validation gap
validation_gap = "1h"

# Outlier handling
outlier_handling = { enabled = true, method = "IQR", threshold = 3.0 }

# Very small batch size
batch_size = { Fixed = 4 }  # Tiny batches

# Device
device = "Auto"

# Frequent monitoring
print_every = 1

[loss]
# Simple loss
loss_function = "MSE"

[features]
# Minimal features
technical_indicators = { enabled = true }
cross_asset = { enabled = false }
