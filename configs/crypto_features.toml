# Example crypto features configuration for LSTM forecasting
# This file demonstrates comprehensive feature engineering for cryptocurrency prediction
#
# USAGE EXAMPLES:
# 1. Basic training: vanga train --symbol BTCUSDT --data data.csv
# 2. Custom features: vanga train --symbol BTCUSDT --data data.csv --features-config configs/crypto_features.toml
# 3. Continue training: vanga train --symbol BTCUSDT --data new_data.csv
# 4. Fresh training: vanga train --symbol BTCUSDT --data data.csv --fresh
#
# CSV STRUCTURE REQUIREMENTS:
# Required columns: timestamp, open, high, low, close, volume
# Custom columns: Any additional numeric columns (sentiment, on-chain, macro, etc.)
#
# TRANSFORMATION TYPES:
# - ZScore: Normalize to mean=0, std=1 (good for ratios, indices)
# - MinMaxScale: Scale to [0,1] (good for bounded values like percentages)
# - PercentChange: Convert to percentage change (good for prices, rates)
# - Log: Logarithmic transformation (good for skewed data like volumes)
# - RobustScale: Robust scaling using median/IQR (good for outlier-prone data)

[technical_indicators]
enabled = true

[technical_indicators.moving_averages]
sma_periods = [5, 10, 20, 50, 200]
ema_periods = [5, 10, 20, 50, 200]
wma_periods = [10, 20]
hull_periods = [9, 21]

[technical_indicators.momentum]
rsi_periods = [14, 21]
stochastic = true
williams_r = true
cci_periods = [14, 20]
momentum_periods = [10, 20]

[technical_indicators.volatility]
bollinger_bands = { enabled = true, period = 20, std_dev = 2.0 }
atr_periods = [14, 21]
keltner_channels = true
donchian_channels = true

[technical_indicators.volume]
obv = true
volume_sma_periods = [10, 20]
mfi_periods = [14]
ad_line = true
chaikin_oscillator = true

[technical_indicators.trend]
macd = { enabled = true, fast_period = 12, slow_period = 26, signal_period = 9 }
adx_periods = [14]
parabolic_sar = true
aroon = true

[technical_indicators.trend.advanced]
enabled = true
hurst_window = 100
fractal_window = 50
regime_window = 50
clustering_window = 50
reversion_window = 50

[market_microstructure]
enabled = true

[market_microstructure.price_dynamics]
velocity_periods = [5, 10, 20]
acceleration_periods = [5, 10]
jerk_periods = [5]

[market_microstructure.volume_price]
vwap_periods = [20, 50]
volume_price_trend = true
ease_of_movement = true
negative_volume_index = true

[market_microstructure.trade_intensity]
enabled = true
lookback_periods = [10, 20, 50]
intensity_metrics = ["TradesPerMinute", "VolumePerTrade"]

[market_microstructure.market_depth]
bid_ask_spread_proxy = true
order_book_imbalance_proxy = true
market_impact_proxy = true

[volatility_features]
enabled = true

[volatility_features.realized_volatility]
periods = ["1h", "4h", "24h"]
estimators = ["Standard", "RangeBasedYangZhang"]

[volatility_features.garch_features]
enabled = true
model_orders = [[1, 1], [1, 2], [2, 1]]
conditional_volatility = true
volatility_forecasts = true

[volatility_features.clustering]
enabled = true
clustering_strength = true
persistence_measures = true

[volatility_features.regime_detection]
enabled = true
methods = ["VolatilityBased", "TrendBased"]
sensitivity = 0.5

[custom_features]
# Automatically include all additional columns from CSV
# RECOMMENDED: Set to true for simplicity - includes any column not in OHLCV
auto_include_all = true

# Specific custom features to include (if auto_include_all = false)
# Use this for precise control over which features to include
include_features = [
    # Sentiment & Social
    "social_sentiment",        # Twitter/Reddit sentiment scores
    "fear_greed_index",       # Crypto Fear & Greed Index (0-100)
    "google_trends",          # Google search trends

    # On-Chain Metrics
    "active_addresses",       # Number of active addresses
    "transaction_count",      # Daily transaction count
    "nvt_ratio",             # Network Value to Transactions ratio
    "mvrv_ratio",            # Market Value to Realized Value ratio
    "realized_cap",          # Realized capitalization

    # Market Microstructure
    "funding_rate",          # Perpetual futures funding rate
    "open_interest",         # Total open interest
    "liquidations",          # Liquidation volumes
    "whale_activity",        # Large holder activity

    # Cross-Market Data
    "binance_volume",        # Volume from specific exchanges
    "coinbase_premium",      # Coinbase premium/discount
    "grayscale_premium",     # Grayscale trust premium

    # Macro Indicators
    "dxy_index",            # US Dollar Index
    "gold_price",           # Gold price correlation
    "sp500_close",          # S&P 500 correlation
    "vix_index"             # VIX volatility index
]

# Features to exclude even if present in CSV
# Use this to filter out noisy or irrelevant columns
exclude_features = [
    "irrelevant_column",
    "noisy_indicator",
    "deprecated_metric",
    "test_column"
]

# Custom transformations for specific features
# Apply mathematical transformations to normalize and improve feature quality
[custom_features.transformations]
# Sentiment & Social (normalize to standard distributions)
social_sentiment = "ZScore"          # Normalize sentiment scores (mean=0, std=1)
fear_greed_index = "MinMaxScale"     # Scale 0-100 index to [0,1]
google_trends = "MinMaxScale"        # Scale search trends to [0,1]

# On-Chain Metrics (handle skewed distributions)
active_addresses = "Log"             # Log transform for address counts
transaction_count = "Log"            # Log transform for transaction counts
realized_cap = "Log"                 # Log transform for large monetary values
nvt_ratio = "ZScore"                 # Normalize NVT ratio
mvrv_ratio = "ZScore"                # Normalize MVRV ratio

# Market Microstructure (handle rates and volumes)
funding_rate = "PercentChange"       # Convert to percentage change
open_interest = "Log"                # Log transform for large volumes
liquidations = "RobustScale"         # Robust scaling for outlier-prone data
whale_activity = "Log"               # Log transform for whale transaction sizes

# Cross-Market Data (standardize different markets)
binance_volume = "Log"               # Log transform for volumes
coinbase_premium = "ZScore"          # Normalize premium/discount
grayscale_premium = "ZScore"         # Normalize trust premium

# Macro Indicators (standardize economic indicators)
dxy_index = "ZScore"                 # Normalize dollar index
gold_price = "PercentChange"         # Convert to percentage change
sp500_close = "PercentChange"        # Convert to percentage change
vix_index = "ZScore"                 # Normalize volatility index

[engineering]

[engineering.polynomial_features]
enabled = false
degree = 2
include_bias = false
interaction_only = true

[engineering.interaction_features]
enabled = true
max_interactions = 10
# Specific feature pairs can be defined here
feature_pairs = []

[engineering.lag_features]
enabled = true
lag_periods = [1, 2, 3, 5, 10]
features_to_lag = ["close", "volume", "rsi_14"]

[engineering.rolling_features]
enabled = true
window_sizes = [5, 10, 20]
statistics = ["Mean", "Std", "Min", "Max"]

[selection]
enabled = true
max_features = 100  # Limit total features
correlation_threshold = 0.95  # Remove highly correlated features
importance_threshold = 0.001  # Minimum feature importance
methods = ["CorrelationFilter", "ImportanceBased"]
keep_crypto_features = true  # Always keep crypto-specific features
