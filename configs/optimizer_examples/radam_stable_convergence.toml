# VANGA RAdam Optimizer Configuration - Stable Convergence Specialist
# Optimized for stable training with variance rectification
# Best for: Large datasets, stable convergence requirements, research scenarios

[training]
# RAdam: Rectified Adam with variance rectification
# - Addresses variance issues in Adam's early training stages
# - More stable convergence than standard Adam
# - Excellent for large crypto datasets
optimizer = { RAdam = { beta1 = 0.9, beta2 = 0.999, eps = 1e-8, weight_decay = 0.01 } }

# Conservative learning rate for stable convergence
learning_rate = 0.0008
learning_schedule = { ReduceOnPlateau = { patience = 12, factor = 0.6 } }

# Extended training for stable convergence
epochs = 150
batch_size = 48  # Larger batches for stability
warmup_epochs = 10  # Extended warmup for variance rectification
early_stopping = { patience = 25, min_delta = 0.00005 }

# Conservative validation for stability
validation_split = 0.18
shuffle_training = false

# Moderate regularization for stable training
dropout_rate = 0.18
l2_regularization = 0.001

[model]
# Stable architecture for large datasets
hidden_units = 128
num_layers = 2
sequence_length = 60
bidirectional = false

[features]
# Comprehensive indicators for stable training
technical_indicators = [
    "sma_10", "sma_20", "sma_50", "ema_12", "ema_26", "ema_50",
    "rsi_14", "rsi_21", "macd", "bollinger_bands", "atr_14",
    "volume_sma", "volume_ema", "obv", "mfi_14"
]

# Standard cross-asset features
cross_asset_features = [
    "btc_dominance", "eth_btc_ratio", "market_cap_rank"
]

[data]
# Conservative preprocessing for stability
normalize_features = true
handle_outliers = true
outlier_threshold = 3.5  # Conservative outlier handling

[targets]
# Balanced targets for stable prediction
price_targets = ["close_1h", "close_4h", "close_1d"]
direction_targets = ["direction_1h", "direction_4h"]
volatility_targets = ["volatility_1h", "volatility_4h"]
