# VANGA AdamW Optimizer Configuration - RECOMMENDED DEFAULT
# Optimized for cryptocurrency forecasting with volatility handling
# Best for: 99% of crypto training scenarios

[training]
# AdamW: Modern optimizer with adaptive learning rates and weight decay
# - Excellent for crypto volatility and regime changes
# - Built-in regularization prevents overfitting on noisy data
# - 20-40% better convergence than SGD on crypto datasets
optimizer = { AdamW = { weight_decay = 0.01, beta1 = 0.9, beta2 = 0.999, eps = 1e-8 } }

# Adaptive learning rate with crypto-optimized settings
learning_rate = { Adaptive = { initial_lr = 0.001, patience = 10, factor = 0.5 } }

# Training parameters optimized for crypto data
epochs = 100
batch_size = 32
warmup_epochs = 5
early_stopping = { patience = 15, min_delta = 0.0001 }

# Validation settings for time-series data
validation_split = 0.2
shuffle_training = false  # Preserve temporal order for crypto data

# Regularization for noisy crypto markets
dropout_rate = 0.2
l2_regularization = 0.001

[model]
# LSTM architecture optimized for crypto patterns
hidden_units = 128
num_layers = 2
sequence_length = 60  # ~1 hour of minute data
bidirectional = false  # Causal for real-time prediction

[features]
# Technical indicators optimized for crypto
technical_indicators = [
    "sma_20", "ema_12", "ema_26", "rsi_14", "macd", "bollinger_bands",
    "volume_sma", "price_velocity", "volatility_20"
]

# Crypto-specific features
cross_asset_features = [
    "btc_dominance", "eth_btc_ratio", "market_cap_rank"
]

[data]
# Data preprocessing for crypto volatility
normalize_features = true
handle_outliers = true
outlier_threshold = 3.0  # 3 standard deviations

# Target configuration for crypto prediction
[targets]
price_targets = ["close_1h", "close_4h", "close_1d"]
direction_targets = ["direction_1h", "direction_4h"]
volatility_targets = ["volatility_1h", "volatility_4h"]
