# VANGA SGD Optimizer Configuration - Fine-tuning Specialist
# Optimized for fine-tuning pre-trained models on specific crypto pairs
# Best for: Final optimization of already-trained models

[training]
# SGD: Traditional optimizer, excellent for fine-tuning
# - Simple and stable for final model refinement
# - Good for transfer learning scenarios
# - Requires careful learning rate tuning
optimizer = { SGD = {} }

# Lower learning rate for fine-tuning stability
learning_rate = 0.0001
learning_schedule = { ReduceOnPlateau = { patience = 5, factor = 0.7 } }

# Fewer epochs for fine-tuning
epochs = 50
batch_size = 16  # Smaller batches for stability
warmup_epochs = 2
early_stopping = { patience = 10, min_delta = 0.00005 }

# Conservative validation for fine-tuning
validation_split = 0.15
shuffle_training = false

# Minimal regularization for fine-tuning
dropout_rate = 0.1
l2_regularization = 0.0005

[model]
# Smaller architecture for fine-tuning
hidden_units = 64
num_layers = 1
sequence_length = 30  # Shorter sequences for stability
bidirectional = false

[features]
# Essential indicators only for fine-tuning
technical_indicators = [
    "sma_20", "ema_12", "rsi_14", "macd", "volume_sma"
]

# Minimal cross-asset features
cross_asset_features = ["btc_dominance"]

[data]
# Conservative preprocessing for fine-tuning
normalize_features = true
handle_outliers = true
outlier_threshold = 2.5  # More conservative outlier detection

[targets]
# Focus on primary targets for fine-tuning
price_targets = ["close_1h"]
direction_targets = ["direction_1h"]
