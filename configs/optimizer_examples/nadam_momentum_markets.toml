# VANGA NAdam Optimizer Configuration - Momentum Markets Specialist
# Optimized for trending crypto markets with strong momentum patterns
# Best for: Bull/bear markets, trending pairs, momentum-driven strategies

[training]
# NAdam: Nesterov-accelerated Adam
# - Combines Adam with Nesterov momentum for trend following
# - Faster convergence than standard Adam
# - Excellent for momentum-driven crypto patterns
optimizer = { NAdam = { beta1 = 0.9, beta2 = 0.999, eps = 1e-8, weight_decay = 0.01, momentum_decay = 0.004 } }

# Optimized learning rate for momentum markets
learning_rate = 0.0015
learning_schedule = { ReduceOnPlateau = { patience = 7, factor = 0.5 } }

# Efficient training for trending markets
epochs = 90
batch_size = 40  # Larger batches for momentum stability
warmup_epochs = 4
early_stopping = { patience = 12, min_delta = 0.0001 }

# Standard validation for trending data
validation_split = 0.2
shuffle_training = false

# Balanced regularization for momentum patterns
dropout_rate = 0.2
l2_regularization = 0.0015

[model]
# Architecture optimized for trend detection
hidden_units = 144
num_layers = 2
sequence_length = 72  # Longer sequences to capture momentum patterns
bidirectional = false

[features]
# Momentum-focused technical indicators
technical_indicators = [
    "sma_10", "sma_20", "sma_50", "ema_12", "ema_26", "ema_50",
    "rsi_14", "macd", "macd_signal", "macd_histogram", "momentum_10",
    "roc_10", "williams_r", "cci_20", "adx_14", "bollinger_bands"
]

# Trend-focused cross-asset features
cross_asset_features = [
    "btc_dominance", "eth_btc_ratio", "market_trend_strength"
]

[data]
# Standard preprocessing for trending data
normalize_features = true
handle_outliers = true
outlier_threshold = 3.0

[targets]
# Trend-focused prediction targets
price_targets = ["close_1h", "close_4h", "close_1d"]
direction_targets = ["direction_1h", "direction_4h", "direction_1d"]
volatility_targets = ["volatility_4h"]
momentum_targets = ["momentum_1h", "momentum_4h"]
