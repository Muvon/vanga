# VANGA AdaMax Optimizer Configuration - Large Gradient Specialist
# Optimized for problems with large gradients and extreme market movements
# Best for: Flash crashes, extreme volatility events, gradient explosion issues

[training]
# AdaMax: Variant of Adam based on infinity norm
# - More stable than Adam for problems with large gradients
# - Good for extreme market movements and flash crashes
# - Handles gradient explosion better than standard optimizers
optimizer = { AdaMax = { beta1 = 0.9, beta2 = 0.999, eps = 1e-8, weight_decay = 0.005 } }

# Moderate learning rate for gradient stability
learning_rate = { Adaptive = { initial_lr = 0.001, patience = 9, factor = 0.5 } }

# Standard training with gradient monitoring
epochs = 100
batch_size = 32
warmup_epochs = 6
early_stopping = { patience = 15, min_delta = 0.0001 }

# Standard validation settings
validation_split = 0.2
shuffle_training = false

# Higher regularization for gradient stability
dropout_rate = 0.25
l2_regularization = 0.002

[model]
# Robust architecture for large gradients
hidden_units = 112
num_layers = 2
sequence_length = 56
bidirectional = false

[features]
# Robust indicators for extreme movements
technical_indicators = [
    "sma_20", "ema_12", "ema_26", "rsi_14", "macd", "bollinger_bands",
    "atr_14", "atr_21", "volume_sma", "volume_ratio", "price_velocity",
    "volatility_20", "keltner_channels", "donchian_channels"
]

# Market stress indicators
cross_asset_features = [
    "btc_dominance", "eth_btc_ratio", "vix_crypto", "fear_greed_index"
]

[data]
# Robust preprocessing for extreme movements
normalize_features = true
handle_outliers = true
outlier_threshold = 2.5  # More sensitive to extreme values

[targets]
# Focus on extreme movement prediction
price_targets = ["close_1h", "close_4h"]
direction_targets = ["direction_1h", "direction_4h"]
volatility_targets = ["volatility_1h", "volatility_4h"]
extreme_targets = ["flash_crash_1h", "extreme_move_4h"]
