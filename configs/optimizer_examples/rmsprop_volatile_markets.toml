# VANGA RMSprop Optimizer Configuration - Volatile Markets Specialist
# Optimized for highly volatile crypto markets and regime changes
# Best for: Meme coins, new tokens, highly volatile trading pairs

[training]
# RMSprop: Designed for non-stationary objectives
# - Perfect for crypto's changing volatility regimes
# - Handles frequent market structure changes
# - Excellent for LSTM/RNN architectures
optimizer = { RMSprop = { alpha = 0.99, eps = 1e-8, weight_decay = 0.01, momentum = 0.0, centered = false } }

# Aggressive adaptive learning rate for volatile markets
learning_rate = 0.002
learning_schedule = { ReduceOnPlateau = { patience = 6, factor = 0.4 } }

# Extended training for volatile data
epochs = 120
batch_size = 24  # Smaller batches for stability in volatile markets
warmup_epochs = 8  # Longer warmup for stability
early_stopping = { patience = 20, min_delta = 0.0002 }

# Larger validation split for volatile data
validation_split = 0.25
shuffle_training = false

# Higher regularization for noisy volatile data
dropout_rate = 0.3
l2_regularization = 0.003

[model]
# Robust architecture for volatile markets
hidden_units = 160
num_layers = 3  # Deeper network for complex volatility patterns
sequence_length = 90  # Longer sequences to capture volatility patterns
bidirectional = false

[features]
# Volatility-focused technical indicators
technical_indicators = [
    "sma_5", "sma_20", "ema_8", "ema_21", "rsi_14", "rsi_7", "macd",
    "bollinger_bands", "atr_14", "atr_7", "volume_sma", "volume_ema",
    "price_velocity", "volatility_10", "volatility_20", "keltner_channels"
]

# Enhanced cross-asset features for market context
cross_asset_features = [
    "btc_dominance", "eth_btc_ratio", "market_cap_rank", "fear_greed_index"
]

[data]
# Aggressive outlier handling for volatile markets
normalize_features = true
handle_outliers = true
outlier_threshold = 2.0  # More aggressive outlier detection

[targets]
# Comprehensive targets for volatile market prediction
price_targets = ["close_30m", "close_1h", "close_4h", "close_1d"]
direction_targets = ["direction_30m", "direction_1h", "direction_4h"]
volatility_targets = ["volatility_30m", "volatility_1h", "volatility_4h"]
