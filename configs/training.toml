# VANGA Advanced Training Configuration
# Comprehensive configuration for LSTM cryptocurrency forecasting
# This file demonstrates all available learning rate optimization features

[training]
# ============================================================================
# EPOCH CONFIGURATION - Training duration control
# ============================================================================
# Choose one approach:
# - Auto: Uses early stopping with maximum epoch limit
# - Fixed: Trains for exact number of epochs
epochs = { Auto = { max_epochs = 1000 } }
# epochs = { Fixed = 500 }

# ============================================================================
# OPTIMIZER CONFIGURATION - Choose from 9 available optimizers
# ============================================================================
# AdamW (RECOMMENDED): Modern optimizer with adaptive learning rates and weight decay
# - Better convergence for most cryptocurrency datasets
# - Handles sparse gradients well
# - Built-in weight decay for regularization
optimizer = { AdamW = { weight_decay = 0.01, beta1 = 0.9, beta2 = 0.999 } }

# SGD: Traditional optimizer, good for fine-tuning
# optimizer = { SGD = { momentum = 0.9 } }  # momentum not yet implemented in Candle
# optimizer = { SGD = {} }  # Basic SGD without momentum

# ============================================================================
# EXTENDED OPTIMIZER OPTIONS - Advanced optimizers from candle-optimisers
# ============================================================================

# Adam: Classic adaptive optimizer, good general-purpose choice
# - Similar to AdamW but without weight decay regularization
# optimizer = { Adam = { beta1 = 0.9, beta2 = 0.999, eps = 1e-8, weight_decay = 0.0, amsgrad = false } }

# AdaDelta: Adaptive learning rate without manual tuning
# - Good for sparse gradients and noisy data
# - Automatically adapts learning rate based on gradient history
# optimizer = { AdaDelta = { rho = 0.95, eps = 1e-6, weight_decay = 0.0 } }

# AdaGrad: Adaptive gradient algorithm for sparse features
# - Accumulates squared gradients for adaptive learning rates
# - Good for sparse data but can slow down over time
# optimizer = { AdaGrad = { lr_decay = 0.0, weight_decay = 0.0, initial_accumulator_value = 0.0, eps = 1e-10 } }

# AdaMax: Variant of Adam based on infinity norm
# - More stable than Adam for some problems
# - Good for problems with large gradients
# optimizer = { AdaMax = { beta1 = 0.9, beta2 = 0.999, eps = 1e-8, weight_decay = 0.0 } }

# NAdam: Nesterov-accelerated Adam
# - Combines Adam with Nesterov momentum
# - Often converges faster than standard Adam
# optimizer = { NAdam = { beta1 = 0.9, beta2 = 0.999, eps = 1e-8, weight_decay = 0.0, momentum_decay = 0.004 } }

# RAdam: Rectified Adam with variance rectification
# - Addresses the variance issue in Adam's early training stages
# - More stable convergence than Adam
# optimizer = { RAdam = { beta1 = 0.9, beta2 = 0.999, eps = 1e-8, weight_decay = 0.0 } }

# RMSprop: Root Mean Square Propagation
# - Good for RNNs and non-stationary objectives
# - Adapts learning rate based on recent gradient magnitudes
# optimizer = { RMSprop = { alpha = 0.99, eps = 1e-8, weight_decay = 0.0, momentum = 0.0, centered = false } }

# ============================================================================
# LEARNING RATE CONFIGURATION - Advanced optimization strategies
# ============================================================================
# ADAPTIVE (RECOMMENDED): Automatically reduces LR when validation loss plateaus
# - Starts with initial_lr and reduces by factor when patience is exceeded
# - Best for most cryptocurrency forecasting tasks
learning_rate = { Adaptive = { initial_lr = 0.001, patience = 10, factor = 0.5 } }

# AUTO: Optimizes learning rate within specified range based on model complexity
# - Uses heuristics to select optimal LR between min_lr and max_lr
# - Good for hyperparameter exploration
# learning_rate = { Auto = { min_lr = 0.0001, max_lr = 0.01 } }

# FIXED: Uses constant learning rate throughout training
# - Simple and predictable, good for fine-tuning
# learning_rate = { Fixed = 0.001 }

# ============================================================================
# WARMUP CONFIGURATION - Gradual learning rate increase
# ============================================================================
# Number of epochs to gradually increase learning rate from 0 to target
# - Prevents early training instability with large models
# - Recommended: 5-10 epochs for most datasets
warmup_epochs = 5

# ============================================================================
# LEARNING RATE SCHEDULING - Advanced decay patterns (OPTIONAL)
# ============================================================================
# Additional learning rate scheduling after warmup (experimental)
# learning_schedule = { LinearDecay = { decay_rate = 0.95 } }
# learning_schedule = { ExponentialDecay = { decay_rate = 0.98 } }
# learning_schedule = { CosineAnnealing = { t_max = 100 } }
# learning_schedule = { WarmRestarts = { t_0 = 50, t_mult = 2 } }
# learning_schedule = "Constant"  # No additional scheduling


# ============================================================================
# DEVICE CONFIGURATION - Hardware acceleration settings
# ============================================================================
# Device selection for training and prediction
# - Auto: Automatically selects best available device (CUDA > Metal > CPU)
# - CPU: Forces CPU usage (slower but always available)
# - GPU: Uses NVIDIA CUDA GPU at specified index (requires CUDA drivers)
# - Metal: Uses Apple Silicon GPU at specified index (macOS only)
device = "Auto"  # Options: "Auto", "CPU", "GPU:0", "Metal:0"

# Device selection examples:
# device = "Auto"     # RECOMMENDED: Auto-detect best device (CUDA > Metal > CPU)
# device = "CPU"      # Force CPU usage (compatible but slower)
# device = "GPU:0"    # Use first NVIDIA CUDA GPU (requires CUDA drivers)
# device = "Metal:0"  # Use first Apple Silicon GPU (macOS only)

# Performance notes:
# - CUDA GPU: Best performance for NVIDIA GPUs with CUDA support
# - Metal GPU: Best performance for Apple Silicon Macs (M1/M2/M3)
# - CPU: Slowest but most compatible, good for development/testing
# - Auto: Intelligently selects fastest available option
# ============================================================================
# BATCH SIZE CONFIGURATION - Memory and performance optimization
# ============================================================================
# AUTO (RECOMMENDED): Automatically selects optimal batch size based on available memory
# - Considers model complexity and system memory
# - Provides best performance/memory trade-off
batch_size = { Auto = { min_size = 32, max_size = 512 } }

# FIXED: Uses constant batch size
# batch_size = { Fixed = 128 }

# ============================================================================
# VALIDATION AND EARLY STOPPING
# ============================================================================
validation_split = 0.2          # 20% of data for validation
validation_gap = "1h"           # Gap between training and validation samples
                                # Prevents information leakage from features with lookback periods
                                # Options: "1h", "2h", "30m", "0" (no gap)
                                # Recommended: "1h" for crypto (24/7 markets)
test_split = 0.1               # 10% of data for final testing
early_stopping = { patience = 50, min_delta = 0.001 }   # Stop after 50 epochs without improvement >= min_delta (adjusted for new loss scale)

# ============================================================================
# GRADIENT OPTIMIZATION
# ============================================================================
gradient_clip = 1.0            # Gradient clipping threshold (prevents exploding gradients)

# ============================================================================
# LOSS FUNCTION CONFIGURATION
# ============================================================================
# Choose ONE loss function by uncommenting the desired option
# Default: MSE (Mean Squared Error) when no [model.loss_function] section is present

# OPTION 1: Use MSE (Mean Squared Error) - Standard regression loss
# Comment out or remove the [model.loss_function] section entirely to use MSE
# This is the DEFAULT behavior when no loss function is configured

# OPTION 2: Composite - Multi-objective crypto-optimized loss (RECOMMENDED)
# Balances accuracy, direction prediction, volatility awareness, and risk
[model.loss_function]
Composite = { accuracy_weight = 0.2, direction_weight = 0.5, volatility_weight = 0.2, risk_weight = 0.1 }

# OPTION 3: DirectionalFocused - Emphasizes directional accuracy for trading
# [model.loss_function]
# DirectionalFocused = { direction_penalty = 2.0 }

# OPTION 4: RiskAdjusted - Incorporates Sharpe ratio and drawdown metrics
# [model.loss_function]
# RiskAdjusted = { sharpe_weight = 0.3, drawdown_weight = 0.7 }

# OPTION 5: VolatilityAware - Adapts to market volatility conditions
# [model.loss_function]
# VolatilityAware = { volatility_threshold = 0.02, penalty_factor = 1.5 }

# OPTION 6: RegimeAware - Adjusts based on market regime detection
# [model.loss_function]
# RegimeAware = { volatility_penalty = 1.2 }

# OPTION 7: MultiObjective - Custom horizon-based weighting
# [model.loss_function]
# MultiObjective = { horizon_weights = [1.0, 0.8, 0.6] }

# ============================================================================
# LOSS FUNCTION WEIGHT EXPLANATIONS
# ============================================================================
# Composite weights:
#   - accuracy_weight: Base MSE loss weight (0.1-0.4 recommended)
#   - direction_weight: Directional prediction importance (0.3-0.6 for trading)
#   - volatility_weight: Volatility prediction weight (0.1-0.3)
#   - risk_weight: Risk-adjusted metrics weight (0.0-0.2)
#   - Weights should sum to 1.0 for balanced scaling
#
# DirectionalFocused:
#   - direction_penalty: Multiplier for wrong direction predictions (1.0-3.0)
#
# RiskAdjusted:
#   - sharpe_weight: Sharpe ratio importance (0.2-0.5)
#   - drawdown_weight: Maximum drawdown penalty (0.5-0.8)
#
# VolatilityAware:
#   - volatility_threshold: Volatility level to trigger penalties (0.01-0.05)
#   - penalty_factor: Penalty multiplier during high volatility (1.2-2.0)
#
# RegimeAware:
#   - volatility_penalty: Market regime adjustment factor (1.0-1.5)

# ============================================================================
# CLASS WEIGHT STRATEGY - Handle imbalanced datasets
# ============================================================================
# Global strategy uses same class weights for both training and validation
# This ensures identical loss scaling for comparable train/val losses
class_weight_strategy = "Global"  # Options: "Global", "PerWindow", "Advanced", "None"

# ============================================================================
# TRAINING MONITORING
# ============================================================================
print_every = 1                # Print training progress every N epochs (1 = every epoch, 10 = every 10 epochs)
                              # - 1: Print every epoch (recommended for monitoring)
                              # - 5: Print every 5 epochs (balanced)
                              # - 10: Print every 10 epochs (less verbose)


# ============================================================================
# DEVICE CONFIGURATION - Select training device (CPU, GPU, Metal)
# =================================s===========================================
# - Auto: (RECOMMENDED) Automatically selects the best available device
# - CPU: Forces CPU usage
# - GPU(0): Uses a specific CUDA device (e.g., GPU(0) for the first GPU)
# - Metal(0): Uses a specific Apple Silicon GPU (e.g., Metal(0) for the first MPS device)
device = "Auto"
# device = "CPU"
# device = { GPU = 0 }
# device = { Metal = 0 }
[model]
# Model architecture configuration
architecture = { MultiLSTM = { layers = 2 } }

# Sequence length configuration
sequence_length = { Auto = { min_length = 30, max_length = 120 } }

# Hidden units configuration
hidden_units = { Auto = { min_units = 64, max_units = 512 } }

# Dropout configuration
[model.dropout]
enabled = true
rate = { Fixed = 0.2 }
variational = true
recurrent = true

# Attention mechanism (optional)
[model.attention]
enabled = true
mechanism = "SelfAttention"
heads = 8
head_dim = 64
dropout_rate = 0.1
temperature_scaling = 1.0
use_relative_position = true

[model.attention.visualization]
save_heatmaps = false
export_analysis = false
output_dir = "attention_analysis"

# Output heads configuration
[model.output_heads]

[model.output_heads.price_levels]
enabled = true
bandwidth_size = 1.0  # Breakout sensitivity multiplier (0.5=sensitive, 1.0=standard, 1.5=conservative)
distribution_type = "Categorical"

# ✅ CONSISTENT: All strategies use same format with internally tagged enum
# See docs/target_strategy_configuration.md for detailed guide
# Option 1: Current strategy (simple future price point)
target_strategy = { type = "current" }

# Option 2: Standard VWAP strategy (volume-weighted average price)
# target_strategy = { type = "standard_vwap" }

# Option 3: Momentum VWAP strategy (momentum-aware VWAP with directional bias)
# target_strategy = { type = "momentum_vwap", momentum_window = 20, bias_strength = 0.3 }

# Parameter explanations for momentum_vwap:
# - momentum_window: Number of periods to calculate momentum (5-50, default: 20)
#   * Conservative: 25-40 (stable, less noise)
#   * Balanced: 15-25 (good responsiveness)
#   * Aggressive: 5-15 (high responsiveness, more noise)
# - bias_strength: Strength of directional bias (0.1-1.0, default: 0.3)
#   * Conservative: 0.1-0.3 (subtle momentum bias)
#   * Balanced: 0.3-0.6 (moderate momentum bias)
#   * Aggressive: 0.6-1.0 (strong momentum bias)

[model.output_heads.direction]
enabled = true
bandwidth_size = 1.0  # Unified sensitivity control for momentum-based direction (0.5=sensitive, 1.0=standard, 1.5=conservative)

[model.output_heads.volatility]
enabled = true
bandwidth_size = 1.0  # Unified sensitivity control (0.5=sensitive, 1.0=standard, 1.5=conservative)
base_percentiles = [0.20, 0.40, 0.60, 0.80]  # Base percentile boundaries for 5-class system

# ✅ FEATURES SECTION - All feature configuration under [features.x]
[features.technical_indicators]
enabled = true

[features.technical_indicators.moving_averages]
sma_periods = [5, 10, 20, 50, 200]
ema_periods = [5, 10, 20, 50, 200]
wma_periods = [10, 20]
hull_periods = [9, 21]

[features.technical_indicators.momentum]
rsi_periods = [14, 21]
stochastic = true
williams_r = true
cci_periods = [14, 20]
momentum_periods = [10, 20]

[features.technical_indicators.volatility]
bollinger_bands = { enabled = true, period = 20, std_dev = 2.0 }
atr_periods = [14, 21]
keltner_channels = true
donchian_channels = true

[features.technical_indicators.volume]
obv = true
volume_sma_periods = [10, 20]
mfi_periods = [14]
volume_profile = true

[features.market_microstructure]
enabled = true

[features.market_microstructure.spread_analysis]
bid_ask_spread = true
effective_spread = true
price_impact = true

[features.market_microstructure.order_flow]
volume_imbalance = true
trade_intensity = true
arrival_rate = true

[features.volatility_features]
enabled = true

[features.volatility_features.realized_volatility]
periods = ["1h", "4h", "24h"]
estimators = ["Standard", "RangeBasedYangZhang"]

[features.volatility_features.garch_features]
enabled = true
model_orders = [[1, 1], [1, 2], [2, 1]]
conditional_volatility = true
volatility_forecasts = true

[features.custom_features]
enabled = true
include_all_numeric = true
exclude_features = ["irrelevant_column", "noisy_indicator"]

[features.engineering]
enabled = true

[features.engineering.polynomial_features]
enabled = false
degree = 2
include_bias = false
interaction_only = true

[features.engineering.interaction_features]
enabled = true
max_interactions = 10
feature_pairs = []

[features.engineering.lag_features]
enabled = true
lag_periods = [1, 2, 3, 5, 10]
features_to_lag = ["close", "volume", "rsi_14"]

[features.engineering.rolling_features]
enabled = true
window_sizes = [5, 10, 20]
statistics = ["Mean", "Std", "Min", "Max"]

[features.selection]
enabled = true
max_features = 100
correlation_threshold = 0.95
importance_threshold = 0.001
methods = ["CorrelationFilter", "ImportanceBased"]
keep_crypto_features = true

# ✅ CROSS-ASSET FEATURES - Enable for multi-symbol training
[features.cross_asset]
enabled = true                    # ENABLED for testing
min_symbols_required = 2          # Require at least 2 symbols
required_symbols = ["BTCUSDT"]    # Require BTC for market analysis
btc_dominance_enabled = true      # Calculate BTC dominance
eth_btc_ratio_enabled = true      # Calculate ETH/BTC ratio (optional)

[features.cross_asset.sentiment_analysis]
enabled = true
lookback_periods = 24             # Hours/days to look back
price_velocity_weight = 0.3       # Weight for price velocity component
volume_spike_weight = 0.3         # Weight for volume spike component
volatility_weight = 0.4           # Weight for volatility component

[features.cross_asset.correlation_analysis]
enabled = true
min_periods = 50                  # Minimum periods for correlation calculation
correlation_window = 20           # Rolling window for correlation

# Optimization configuration
[optimization]
enabled = false
method = "None"
n_trials = 100
timeout_seconds = 3600
metric = "MAE"
