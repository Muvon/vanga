# VANGA Advanced Training Configuration
# Comprehensive configuration for LSTM cryptocurrency forecasting
# This file demonstrates all available learning rate optimization features

[training]
# ============================================================================
# EPOCH CONFIGURATION - Training duration control
# ============================================================================
# Choose one approach:
# - Auto: Uses early stopping with maximum epoch limit
# - Fixed: Trains for exact number of epochs
epochs = { Auto = { max_epochs = 1000 } }
# epochs = { Fixed = 500 }

# ============================================================================
# OPTIMIZER CONFIGURATION - Choose between SGD and AdamW
# ============================================================================
# AdamW (RECOMMENDED): Modern optimizer with adaptive learning rates and weight decay
# - Better convergence for most cryptocurrency datasets
# - Handles sparse gradients well
# - Built-in weight decay for regularization
optimizer = { AdamW = { weight_decay = 0.01, beta1 = 0.9, beta2 = 0.999 } }

# SGD: Traditional optimizer, good for fine-tuning
# optimizer = { SGD = { momentum = 0.9 } }  # momentum not yet implemented in Candle
# optimizer = { SGD = {} }  # Basic SGD without momentum

# ============================================================================
# LEARNING RATE CONFIGURATION - Advanced optimization strategies
# ============================================================================
# ADAPTIVE (RECOMMENDED): Automatically reduces LR when validation loss plateaus
# - Starts with initial_lr and reduces by factor when patience is exceeded
# - Best for most cryptocurrency forecasting tasks
learning_rate = { Adaptive = { initial_lr = 0.001, patience = 10, factor = 0.5 } }

# AUTO: Optimizes learning rate within specified range based on model complexity
# - Uses heuristics to select optimal LR between min_lr and max_lr
# - Good for hyperparameter exploration
# learning_rate = { Auto = { min_lr = 0.0001, max_lr = 0.01 } }

# FIXED: Uses constant learning rate throughout training
# - Simple and predictable, good for fine-tuning
# learning_rate = { Fixed = 0.001 }

# ============================================================================
# WARMUP CONFIGURATION - Gradual learning rate increase
# ============================================================================
# Number of epochs to gradually increase learning rate from 0 to target
# - Prevents early training instability with large models
# - Recommended: 5-10 epochs for most datasets
warmup_epochs = 5

# ============================================================================
# LEARNING RATE SCHEDULING - Advanced decay patterns (OPTIONAL)
# ============================================================================
# Additional learning rate scheduling after warmup (experimental)
# learning_schedule = { LinearDecay = { decay_rate = 0.95 } }
# learning_schedule = { ExponentialDecay = { decay_rate = 0.98 } }
# learning_schedule = { CosineAnnealing = { t_max = 100 } }
# learning_schedule = { WarmRestarts = { t_0 = 50, t_mult = 2 } }
# learning_schedule = "Constant"  # No additional scheduling

# ============================================================================
# BATCH SIZE CONFIGURATION - Memory and performance optimization
# ============================================================================
# AUTO (RECOMMENDED): Automatically selects optimal batch size based on available memory
# - Considers model complexity and system memory
# - Provides best performance/memory trade-off
batch_size = { Auto = { min_size = 32, max_size = 512 } }

# FIXED: Uses constant batch size
# batch_size = { Fixed = 128 }

# ============================================================================
# VALIDATION AND EARLY STOPPING
# ============================================================================
validation_split = 0.2          # 20% of data for validation
test_split = 0.1               # 10% of data for final testing
early_stopping_patience = 50   # Stop after 50 epochs without improvement

# ============================================================================
# GRADIENT OPTIMIZATION
# ============================================================================
gradient_clip = 1.0            # Gradient clipping threshold (prevents exploding gradients)

[model]
# Model architecture configuration
architecture = { MultiLSTM = { layers = 2 } }

# Sequence length configuration
sequence_length = { Auto = { min_length = 30, max_length = 120 } }

# Hidden units configuration
hidden_units = { Auto = { min_units = 64, max_units = 512 } }

# Dropout configuration
[model.dropout]
enabled = true
rate = { Fixed = 0.2 }
variational = true
recurrent = true

# Attention mechanism (optional)
[model.attention]
enabled = true
mechanism = "SelfAttention"
heads = 8
head_dim = 64
dropout_rate = 0.1
temperature_scaling = 1.0
use_relative_position = true

[model.attention.visualization]
save_heatmaps = false
export_analysis = false
output_dir = "attention_analysis"

# Output heads configuration
[model.output_heads]

[model.output_heads.price_levels]
enabled = true
bins = 10
range_percent = 0.05
distribution_type = "Categorical"

[model.output_heads.direction]
enabled = true
threshold = 0.01
confidence_calibration = true

[model.output_heads.volatility]
enabled = true
method = "Direct"
horizons = ["1h", "4h", "1d"]

# ✅ FEATURES SECTION - All feature configuration under [features.x]
[features.technical_indicators]
enabled = true

[features.technical_indicators.moving_averages]
sma_periods = [5, 10, 20, 50, 200]
ema_periods = [5, 10, 20, 50, 200]
wma_periods = [10, 20]
hull_periods = [9, 21]

[features.technical_indicators.momentum]
rsi_periods = [14, 21]
stochastic = true
williams_r = true
cci_periods = [14, 20]
momentum_periods = [10, 20]

[features.technical_indicators.volatility]
bollinger_bands = { enabled = true, period = 20, std_dev = 2.0 }
atr_periods = [14, 21]
keltner_channels = true
donchian_channels = true

[features.technical_indicators.volume]
obv = true
volume_sma_periods = [10, 20]
mfi_periods = [14]
volume_profile = true

[features.market_microstructure]
enabled = true

[features.market_microstructure.spread_analysis]
bid_ask_spread = true
effective_spread = true
price_impact = true

[features.market_microstructure.order_flow]
volume_imbalance = true
trade_intensity = true
arrival_rate = true

[features.volatility_features]
enabled = true

[features.volatility_features.realized_volatility]
periods = ["1h", "4h", "24h"]
estimators = ["Standard", "RangeBasedYangZhang"]

[features.volatility_features.garch_features]
enabled = true
model_orders = [[1, 1], [1, 2], [2, 1]]
conditional_volatility = true
volatility_forecasts = true

[features.custom_features]
enabled = true
include_all_numeric = true
exclude_features = ["irrelevant_column", "noisy_indicator"]

[features.engineering]
enabled = true

[features.engineering.polynomial_features]
enabled = false
degree = 2
include_bias = false
interaction_only = true

[features.engineering.interaction_features]
enabled = true
max_interactions = 10
feature_pairs = []

[features.engineering.lag_features]
enabled = true
lag_periods = [1, 2, 3, 5, 10]
features_to_lag = ["close", "volume", "rsi_14"]

[features.engineering.rolling_features]
enabled = true
window_sizes = [5, 10, 20]
statistics = ["Mean", "Std", "Min", "Max"]

[features.selection]
enabled = true
max_features = 100
correlation_threshold = 0.95
importance_threshold = 0.001
methods = ["CorrelationFilter", "ImportanceBased"]
keep_crypto_features = true

# ✅ CROSS-ASSET FEATURES - Enable for multi-symbol training
[features.cross_asset]
enabled = true                    # ENABLED for testing
min_symbols_required = 2          # Require at least 2 symbols
required_symbols = ["BTCUSDT"]    # Require BTC for market analysis
btc_dominance_enabled = true      # Calculate BTC dominance
eth_btc_ratio_enabled = true      # Calculate ETH/BTC ratio (optional)

[features.cross_asset.sentiment_analysis]
enabled = true
lookback_periods = 24             # Hours/days to look back
price_velocity_weight = 0.3       # Weight for price velocity component
volume_spike_weight = 0.3         # Weight for volume spike component
volatility_weight = 0.4           # Weight for volatility component

[features.cross_asset.correlation_analysis]
enabled = true
min_periods = 50                  # Minimum periods for correlation calculation
correlation_window = 20           # Rolling window for correlation

# Optimization configuration
[optimization]
enabled = false
method = "None"
n_trials = 100
timeout_seconds = 3600
metric = "MAE"
