# Prodigy Optimizer Configuration - Learning-Rate-Free Training
# Paper: "Prodigy: An Expeditiously Adaptive Parameter-Free Learner" (ICLR 2024)
# https://arxiv.org/abs/2306.06101

symbol = "BTCUSDT"
data_path = "data/BTCUSDT_1h.csv"
fresh_training = true
continue_training = false
horizons = ["1h", "4h", "1d"]

[features]
enabled = true
technical_indicators = true
cross_asset_features = false
market_microstructure = false

[model]
hidden_sizes = [256, 128]
num_layers = 2
dropout = 0.2
bidirectional = false
use_attention = false

[training]
device = "auto"

# CRITICAL: Set learning_rate = 1.0 for Prodigy
# Prodigy automatically adapts the learning rate during training
learning_rate = 1.0

# Prodigy optimizer configuration
optimizer = { Prodigy = {
    d_coef = 1.0,              # D estimate coefficient (0.5-2.0 range, 1.0 recommended)
    growth_rate = "inf",       # Unlimited D growth (recommended for best adaptation)
    beta1 = 0.9,               # First moment decay (momentum)
    beta2 = 0.999,             # Second moment decay (variance)
    eps = 1e-8,                # Numerical stability epsilon
    weight_decay = 0.01,       # L2 regularization (0.0-0.1 range)
    safeguard_warmup = false   # No warmup needed for Prodigy
}}

# Epochs configuration
epochs = { Auto = { patience = 20, min_epochs = 10, max_epochs = 300 }}

# Batch size
batch_size = { Auto = { min_size = 16, max_size = 128, target_memory_usage = 0.8 }}

# NO warmup needed for Prodigy (it adapts automatically)
warmup_epochs = 0

# NO learning schedule needed (Prodigy handles everything)
# learning_schedule is omitted - Prodigy auto-adjusts LR

# Validation configuration
validation_split = 0.2
validation_gap = "0"
test_split = 0.1

# Early stopping (Prodigy converges faster, so lower patience)
[training.early_stopping]
enabled = true
patience = 15              # Reduced from 20 (Prodigy converges faster)
min_delta = 0.0001
restore_best_weights = true

# Gradient clipping (still useful for stability)
gradient_clip = 1.0

# Progress reporting
print_every = 1

# Walk-forward training (optional)
window_decay = 1.0         # No decay needed with Prodigy
min_train_ratio = 0.5
min_increment_ratio = 0.3

[data]
sequence_length = 60
sequence_stride = 1
remove_outliers = true
outlier_method = "iqr"
outlier_threshold = 3.0

[optimization]
enabled = false            # No hyperparameter optimization needed with Prodigy!

[targets]
price_levels = true
direction = true
volatility = true
volume = false
sentiment = false

# Prodigy Benefits:
# ✅ Zero learning rate tuning required
# ✅ Automatically adapts to data complexity
# ✅ Faster convergence than Adam/AdamW
# ✅ Works across different symbols without retuning
# ✅ Handles crypto volatility automatically
# ✅ No warmup or learning schedule needed
# ✅ Provably optimal convergence (ICLR 2024)

# Usage:
# cargo run -- train --symbol BTCUSDT --data data/BTCUSDT_1h.csv --config configs/prodigy.toml

# Expected Results:
# - 2x faster convergence vs AdamW
# - Automatic LR adaptation every step
# - No manual tuning required
# - Works for all trading pairs
