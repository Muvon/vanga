# Linear Bias Correction Configuration
# Based on "Seeing Beyond Noise: Improving Cryptocurrency Forecasting with Linear Bias Correction"
# Adapted for 5-class classification system with TRAINING INTEGRATION

[bias_correction]
# Enable/disable bias correction system
enabled = true

# Smoothing factor for bias factor calculation
# 0.0 = no smoothing (use raw calculated factors)
# 1.0 = maximum smoothing (heavily weight previous factors)
# Recommended: 0.1 for stable but responsive correction
smoothing_factor = 0.1

# Bounds for correction factors to prevent extreme adjustments
# [min_factor, max_factor] - factors outside this range will be clamped
# Recommended: [0.5, 2.0] allows significant but not extreme corrections
correction_bounds = [0.5, 2.0]

# Minimum validation samples required for reliable bias correction
# Below this threshold, bias correction will be skipped
# Recommended: 100+ samples for stable statistics
min_samples = 100

# Overall confidence adjustment factor
# 1.0 = no adjustment, >1.0 = increase confidence, <1.0 = decrease confidence
# This scales the overall prediction confidence after class-specific corrections
confidence_adjustment = 1.0

# Print detailed bias correction info during training
# true = show detailed class-by-class breakdown
# false = show concise single-line summary (recommended for cleaner logs)
print_info = false

# Use ensemble calibration instead of LinearBiasCorrector
# true = use EnsembleCalibrator (temperature scaling + label smoothing + mixup)
#        - Temperature scaling: Per-class temperature adjustment for calibration
#        - Label smoothing: Adaptive smoothing to prevent overconfidence
#        - Mixup: Data augmentation for better generalization
#        - Provides comprehensive calibration with ECE (Expected Calibration Error) tracking
# false = use LinearBiasCorrector (class-specific bias correction)
#        - Simpler, more interpretable class-specific bias factors
#        - Direct correction of class imbalances
# Recommended: true for EnsembleCalibrator (more sophisticated, better calibration)
# ============================================================================
# ENSEMBLE CALIBRATION - POST-HOC temperature scaling + training-time methods
# ============================================================================
# CRITICAL: Temperature scaling is POST-HOC ONLY (applied after training)
#
# Research Foundation:
# - Guo et al. 2017: "On Calibration of Modern Neural Networks"
# - ICLR 2025: "GETS: Ensemble Temperature Scaling for Calibration"
# - AWS Prescriptive Guidance 2024: Temperature scaling is post-processing
#
# When enabled (use_ensemble_calibration = true):
# 1. DURING TRAINING:
#    - Label smoothing applied to targets (training-time regularization)
#    - Mixup applied to batches (training-time augmentation)
#    - NO temperature scaling (would cause validation data leakage)
#
# 2. AFTER TRAINING (POST-HOC):
#    - Temperature optimized on validation set (minimizes NLL)
#    - Saved with model for inference use
#
# 3. DURING INFERENCE:
#    - Temperature scaling applied to logits (post-hoc calibration)
#    - Improves probability calibration without changing predictions
#
# IMPORTANT: Bias correction (enabled above) runs INDEPENDENTLY
# - Bias correction: Training-time method (applied to logits during training)
# - Ensemble calibration: Post-hoc method (applied after training completes)
# - Both can be used together for optimal results
#
use_ensemble_calibration = true

# NEW: Training Integration Parameters (FULLY ADAPTIVE)
# Ramp-up epochs for gradual integration into training
# The correction strength gradually increases from 0 to adaptive maximum over these epochs
# This prevents shocking the model with sudden corrections
ramp_up_epochs = 10

# Recalibration frequency (epochs between recalibration during training)
# 0 = no recalibration during training (only initial calibration)
# 5 = recalibrate every 5 epochs with recent validation data
# Recommended: 5 for adaptive correction that evolves with the model
recalibration_frequency = 5

# NOTE: Correction strength is now FULLY ADAPTIVE based on:
# - Actual class imbalance in predictions vs targets
# - Validation accuracy (less correction if already accurate)
# - Ordinal relationship preservation (conservative for monotonic classes)
# No manual tuning required!

# Advanced Configuration (Optional)
# Advanced Configuration (Optional)
[bias_correction.advanced]
# Confidence bounds for extreme prediction filtering
# Predictions with confidence outside these bounds may be flagged
confidence_bounds = [0.1, 0.9]
# Logging configuration
[bias_correction.logging]
# Enable detailed bias correction logging
detailed_logging = true

# Log correction metrics every N applications
metrics_logging_frequency = 100

# Log class distribution changes
log_distribution_changes = true

# Examples of different bias correction strategies
[bias_correction.strategies.conservative]
enabled = true
smoothing_factor = 0.2
correction_bounds = [0.7, 1.4]
confidence_adjustment = 0.95

[bias_correction.strategies.aggressive]
enabled = true
smoothing_factor = 0.05
correction_bounds = [0.3, 3.0]
confidence_adjustment = 1.1

[bias_correction.strategies.balanced]
enabled = true
smoothing_factor = 0.1
correction_bounds = [0.5, 2.0]
confidence_adjustment = 1.0
