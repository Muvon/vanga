# TFT-Enhanced VANGA Training Configuration
# Temporal Fusion Transformer features built on existing LSTM architecture

[training]
# Training hyperparameters
epochs = { Auto = { max_epochs = 100 } }
batch_size = { Auto = { min_size = 16, max_size = 128 } }
learning_rate = { Auto = { min_rate = 0.0001, max_rate = 0.01 } }
validation_split = 0.2
test_split = 0.1
early_stopping_patience = 10
gradient_clip = 1.0

[model]
# Use existing architecture with TFT enhancements
architecture = { MultiLSTM = { layers = 2 } }

# Sequence length configuration
sequence_length = { Auto = { min_length = 30, max_length = 120 } }

# Hidden units configuration
hidden_units = { Auto = { min_units = 64, max_units = 512 } }

# Dropout configuration
[model.dropout]
enabled = true
rate = { Auto = { min_rate = 0.1, max_rate = 0.5 } }
variational = true
recurrent = true

# Enhanced attention with TFT Variable Selection
[model.attention]
enabled = true
mechanism = "VariableSelection"  # NEW: TFT Variable Selection
heads = 8
dropout_rate = 0.1
temperature_scaling = 1.0
use_relative_position = true

# TFT Variable Selection configuration
[model.attention.variable_selection]
static_selection = true
temporal_selection = true
selection_threshold = 0.15  # Crypto-optimized threshold
top_k_features = 20         # Limit to top 20 features
enable_interpretability = true

[model.attention.visualization]
save_heatmaps = false
export_analysis = false
output_dir = "attention_analysis"

# Multi-target outputs (existing)
[model.output_heads.price_levels]
enabled = true
bins = 10
range_percent = 5.0
distribution_type = "Categorical"

[model.output_heads.direction]
enabled = true
threshold = 0.01
confidence_calibration = true

[model.output_heads.volatility]
enabled = true
method = "Direct"
horizons = ["1h", "4h", "24h"]

# NEW: TFT Quantile Regression outputs
[model.quantile_outputs]
enabled = true
quantiles = [0.05, 0.25, 0.5, 0.75, 0.95]  # 90% prediction interval
loss_weighting = "extreme_weighted"          # Higher weight for extreme quantiles
uncertainty_calibration = true

[data]
# Data preprocessing configuration
normalization = "Robust"
sequence_overlap = 0.8

[data.outlier_handling]
enabled = true
method = "ModifiedZScore"
threshold = 3.5

[data.feature_selection]
enabled = true
max_features = 100
correlation_threshold = 0.95
importance_threshold = 0.001

[optimization]
# Hyperparameter optimization settings
enabled = false
n_trials = 50
metric = "MAE"                             # MAE, RMSE, MAPE, SharpeRatio, MaxDrawdown, DirectionalAccuracy
method = "Bayesian"
timeout_seconds = 3600
