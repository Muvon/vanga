# Fixed Epochs Training Config (No Early Stopping)
# Use this when you want exact control over training duration

[training]
# Fixed epochs - will train for exactly 200 epochs, no early stopping
epochs = { Fixed = 200 }

# Fixed learning rate - no adaptation
learning_rate = { Fixed = 0.001 }

# No validation split since we're not using early stopping
validation_split = 0.0

# Other parameters
batch_size = { Fixed = 64 }
test_split = 0.1
gradient_clip = 1.0

# Note: early_stopping_patience is ignored when using Fixed epochs
early_stopping_patience = 50
